<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katbghini? ❤️</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fce4ec;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        img {
            width: 150px;
            margin-bottom: 20px;
        }

        h1 {
            color: #ad1457;
            font-size: 2rem;
        }

        .buttons {
            margin-top: 30px;
            position: relative;
            width: 300px;
            height: 100px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            position: absolute;
        }

        #yesBtn {
            background-color: #e91e63;
            color: white;
            left: 20px;
        }

        #noBtn {
            background-color: #ffffff;
            color: #e91e63;
            border: 2px solid #e91e63;
            right: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/4359/4359642.png" alt="Cute Animal">
        <h1 id="question">Katbghini? 🥺</h1>
        
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">Ah</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">La</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');

        // وظيفة تجعل زر "La" يهرب
        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = "fixed";
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }

        // وظيفة عند الضغط على "Ah"
        function celebrate() {
            question.innerHTML = "I Love You Too! ❤️✨";
            noBtn.style.display = "none";
            document.body.style.backgroundColor = "#ff80ab";
        }
    </script>

</body>
</html>
